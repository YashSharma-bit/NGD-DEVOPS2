# ============================================================
# India Regional Development Analytics System
# Docker Compose — Full Stack
# ============================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f api    # tail API logs
#   docker compose down -v        # stop + remove volumes
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL + PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: india_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: india_dev_analytics
      POSTGRES_USER: ${POSTGRES_USER:-analyst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d india_dev_analytics"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 512mb
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=100

  # ── Neo4j ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: india_analytics_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Redis (API cache) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: india_analytics_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: india_analytics_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── ETL runner (one-shot) ────────────────────────────────
  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    container_name: india_analytics_etl
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - etl              # only runs when: docker compose --profile etl up etl

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  default:
    name: india_analytics_net
